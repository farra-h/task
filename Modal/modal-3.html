<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal-3</title>
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/add-unit.css" />
    <style>
      body {
        background-color: #666; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      
      .success-card {
        background: white;
        padding: 60px 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 560px;
      }

      .icon-box {
        width: 80px;
        height: 80px;
        background-color: #F0FDF4;
        border: 2px solid #22C55E;
        color: #22C55E;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px auto; 
        font-size: 30px;
      }
    </style>
  </head>
  <body>

    <div class="success-card">
      <div class="icon-box">
        <i class="bi bi-check-circle"></i>
      </div>
      <h3 class="text-black fw-bold">Verification in review!</h3>
      <p class="text-muted">Your identity is being confirmed.Your listing will be live within 24 hours.</p>
      <div
        class="d-flex flex-column-reverse gap-2 mt-3 mx-auto"
        style="max-width: 250px;"
      >
        <!-- <button class="btn back-btn">Do it later</button> -->
        <button class="btn continue-btn">Got to Home</button>
      </div>
    </div>

  </body>
</html>
