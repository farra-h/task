<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Alert 2</title>
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/add-unit.css" />
  </head>
  <body>
    <div class="container py-5">
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="logo"><img src="/assetes/imgg.jpeg" alt="" /></div>

        <div class="d-flex align-items-center gap-3">
          <span class="text-black">Switch to guest</span>
          <div
            class="border border-1 border-black py-1 px-2 round cursor-pointer shadow-sm"
          >
            <i class="bi bi-list me-2"></i>
            <i class="bi bi-person-circle"></i>
          </div>
        </div>
      </div>

      <div>
        <div class="d-flex flex-column gap-2 align-items-center">
          <img src="/assetes/image.png" alt="" width="250">
          <h2 class="fw-bold">Your listing is in review</h2>
          <p class="text-muted text-center" style="max-width: 300px;">Your listing will be live in 24 hour</p>
        </div>
      </div>
      
      <!-- Buttons -->
      <div
        class="d-flex flex-column-reverse gap-2 mt-5 mx-auto"
        style="max-width: 350px;"
      >
        <!-- <button class="btn back-btn">Do it later</button> -->
        <button class="btn continue-btn">Got to Home</button>
      </div>
    </div>
    <script src="/js/main.js"></script>
  </body>
</html>
