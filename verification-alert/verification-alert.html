<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Alert</title>
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <link rel="stylesheet" href="/css/bootstrap.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/add-unit.css" />
  </head>
  <body>
    <div class="container py-5">
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div class="logo"><img src="/assetes/imgg.jpeg" alt="" /></div>

        <div class="d-flex align-items-center gap-3">
          <span class="text-black">Switch to guest</span>
          <div
            class="border border-1 border-black py-1 px-2 round cursor-pointer shadow-sm"
          >
            <i class="bi bi-list me-2"></i>
            <i class="bi bi-person-circle"></i>
          </div>
        </div>
      </div>

      <div>
        <div class="d-flex flex-column gap-2 align-items-center">
          <img src="/assetes/image.png" alt="" width="250">
          <h2 class="fw-bold">Verify your identity to publish your listing</h2>
          <p class="text-muted text-center" style="max-width: 300px;">To keep our community safe, we need to confirm your identity before your listing goes live.</p>
        </div>

        <div
              class="alert alert-primary border-0 d-flex gap-3 align-items-start"
              style="
                background-color: #f0f7ff;
                color: #3b82f6;
                border-radius: 12px;
              "
            >
              <i class="bi bi-info-circle-fill fs-5"></i>
              <p class="mb-0" style="font-size: 14px">
                Your listing will be published once your identity is verified.
              </p>
        </div>
      </div>
      
      <!-- Buttons -->
      <div
        class="d-flex flex-column-reverse gap-2 mt-5 mx-auto"
        style="max-width: 350px;"
      >
        <button class="btn back-btn">Do it later</button>
        <button class="btn continue-btn">Verify Identity</button>
      </div>
    </div>
    <script src="/js/main.js"></script>
  </body>
</html>
